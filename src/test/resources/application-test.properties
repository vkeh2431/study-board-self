# test는 H2 사용 (Testcontainers는 Phase 16). 공통에서 datasource를 뺐으므로 여기 명시
spring.datasource.url=jdbc:h2:mem:studyboard;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
# V1__init.sql은 MySQL 전용(ENGINE=InnoDB, DATETIME(6), AUTO_INCREMENT) → test(H2)에선 Flyway 끄고 create-drop
spring.flyway.enabled=false
# test 프로파일은 dev 설정을 상속하지 않으므로 스키마 생성 명시
spring.jpa.hibernate.ddl-auto=create-drop
# Hibernate Statistics: N+1 검증용 쿼리 카운트 활성화
spring.jpa.properties.hibernate.generate_statistics=true
# 메인 설정의 batch_fetch_size=10이 N+1을 IN-clause로 가리므로 테스트에서는 비활성화
spring.jpa.properties.hibernate.default_batch_fetch_size=-1
spring.jpa.show-sql=true
# Phase 16: 캐시 자동설정은 들어왔지만(starter-cache) 기본 test는 인메모리 simple 캐시를 쓴다.
# starter-data-redis가 클래스패스에 있어도 simple이면 @CacheEvict/@Cacheable이 Redis에 접속하지 않아
# 캐시를 쓰는 쓰기 경로(create/update/delete)를 포함한 통합 테스트가 Redis 없이 동작한다.
# 실제 Redis 캐싱 검증은 PostCacheTest가 spring.cache.type=redis + Testcontainers Redis로 따로 한다.
spring.cache.type=simple
# JWT 테스트 시크릿(결정적, HS256 최소 길이 이상)
jwt.secret=test-secret-key-for-study-board-0123456789abcdef
jwt.access-token-validity=3600000
jwt.refresh-token-validity=1209600000
