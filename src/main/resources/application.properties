spring.application.name=study-board-self
# 활성 프로파일 (미지정 시 dev)
spring.profiles.active=dev
# DataSource는 프로파일별로 분리 (dev/prod=MySQL, test=H2)
# ddl-auto / spring.flyway.*도 프로파일마다 달라 공통에 두지 않는다 (Phase 13)
# JPA 공통
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=10
# OSIV 비활성화 - 모든 환경 공통 (Phase 9 핵심 학습 포인트)
spring.jpa.open-in-view=false
# JWT (Phase 11) - 공통. 실운영 시크릿은 환경변수로 주입(Phase 13)
# secret은 HS256 최소 길이(32바이트) 이상이어야 한다
jwt.secret=change-me-in-prod-this-is-a-very-long-dev-secret-key-0123456789
jwt.access-token-validity=3600000
jwt.refresh-token-validity=1209600000
